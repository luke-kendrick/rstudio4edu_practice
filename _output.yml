bookdown::gitbook:
  highlight: haddock
  css: style.css
  config:
    toc:
      collapse: section
      before: |
       <li><a href="./">DA Booky Wooky</a></li>
      after: |
        <li><a href="https://github.com/rstudio/bookdown" target="blank">Published with bookdown</a></li>
    download: ["rmd"]
    edit:
      link: https://github.com/username/repository/edit/master/%s
      text: "Suggest an edit"
    sharing:
      github: yes
      facebook: no
      twitter: no
      all: no